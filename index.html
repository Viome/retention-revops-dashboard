<!DOCTYPE html>
<!-- ABOUTME: Retention RevOps scorecard — 6 uniform metric cards over live Shopify data + a retention-roadmap initiatives table -->
<!-- ABOUTME: with Metric + Owner dropdown filters, category owners, launch quarter, and modeled expected-impact / change-since-launch / notes. -->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Retention RevOps — Scorecard</title>
<style>
  :root{
    --bg:#f4f4f5; --panel:#fff; --line:#e7e7e9; --line2:#f0f0f1;
    --ink:#000; --muted:#717384; --muted2:#42434d;
    --green:#146464; --amber:#ab6700; --red:#da1c2c;
    --greenBg:#ecf2f1; --amberBg:#f6efe1; --redBg:#fbecea; --blueBg:#e7eef6; --blue:#1f4855;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--ink);
    font-family:"Helvetica Neue",Helvetica,system-ui,-apple-system,"Segoe UI",sans-serif;
    -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;}
  .wrap{max-width:1180px;margin:0 auto;padding:44px 40px 80px;}

  .eyebrow{font-size:13px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted2);}
  h1{font-weight:400;font-size:38px;line-height:1.1;letter-spacing:-.015em;margin:10px 0 0;}
  .head-row{display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:20px;margin-bottom:24px;}
  .period-cap{text-align:right;}
  .period-cap .k{font-size:13px;font-weight:300;color:var(--muted);}
  .period-cap .v{font-size:19px;font-weight:400;margin-top:2px;}

  .controls{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:18px;}
  .ctl-label{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);}
  .chip{height:34px;padding:0 15px;border-radius:9999px;border:1px solid #cfd0d4;background:#fff;color:#000;
    font:inherit;font-size:13px;font-weight:500;cursor:pointer;white-space:nowrap;}
  .chip.on{background:#000;color:#fff;border-color:#000;}
  .chip.sm{height:30px;padding:0 13px;font-size:12.5px;}
  .note{font-size:12.5px;color:var(--muted);margin:2px 0 16px;min-height:16px;}
  .note b{color:var(--muted2);font-weight:500;}

  .panel{background:var(--panel);border:1px solid var(--line);}
  .panel-h{display:flex;justify-content:space-between;align-items:center;padding:22px 28px;border-bottom:1px solid var(--line);flex-wrap:wrap;gap:8px;}
  .panel-h .t{font-size:16px;font-weight:500;}
  .panel-h .r{font-size:13px;font-weight:300;color:var(--muted2);}
  .panel-h .r b{font-weight:500;color:#000;}

  /* KPI grid */
  .kpis{display:grid;grid-template-columns:repeat(6,1fr);}
  .mcard{position:relative;background:#fff;color:#000;border:none;border-right:1px solid var(--line);border-bottom:1px solid var(--line);
    padding:18px 18px 20px;display:flex;flex-direction:column;min-height:184px;}
  .mcard.core{background:#141821;color:#fff;}
  .m-top{display:flex;justify-content:space-between;align-items:flex-start;gap:6px;min-height:44px;}
  .m-name{font-size:12px;font-weight:500;color:var(--muted);line-height:1.3;}
  .mcard.core .m-name{color:#aeb4c2;}
  .m-tools{display:inline-flex;gap:5px;align-items:center;flex:none;}
  .m-badge{font-size:8px;font-weight:800;letter-spacing:.04em;padding:2px 5px;border-radius:4px;white-space:nowrap;}
  .m-badge.live{background:var(--greenBg);color:var(--green);}
  .m-badge.interim{background:var(--blueBg);color:var(--blue);}
  .mcard.core .m-badge.core{background:#5eead4;color:#0f3d3a;}
  .m-val{font-size:28px;font-weight:400;letter-spacing:-.015em;margin-top:8px;line-height:1.05;}
  .m-trend{font-size:11.5px;font-weight:400;margin-top:7px;}
  .up{color:var(--green);} .down{color:var(--red);} .flat{color:var(--muted);}
  .mcard.core .flat{color:#8b93a6;}
  .m-ctx{font-size:11.5px;font-weight:400;color:var(--muted);margin-top:auto;padding-top:10px;}
  .mcard.core .m-ctx{color:#8b93a6;}
  .m-goal{font-size:11.5px;font-weight:500;margin-top:6px;padding-top:6px;border-top:1px solid var(--line2);}
  .mcard.core .m-goal{border-top-color:#2b3346;}
  .m-goal .gl{font-size:9px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);margin-right:5px;}
  .mcard.core .m-goal .gl{color:#8b93a6;}
  .m-goal.unset{color:#a7a8b3;font-weight:400;font-style:italic;}

  .i{display:inline-flex;align-items:center;justify-content:center;width:15px;height:15px;border-radius:50%;
    background:#e2e2e6;color:#5b5c66;font-size:9px;font-weight:700;font-style:italic;font-family:Georgia,serif;cursor:pointer;user-select:none;flex:none;}
  .i:hover{background:#000;color:#fff;}
  .mcard.core .i{background:#2b3346;color:#c7ccd8;}
  #tip{position:fixed;z-index:99;max-width:300px;background:#141821;color:#e9eaee;font-size:12px;line-height:1.5;
    padding:13px 15px;border-radius:10px;box-shadow:0 10px 34px rgba(0,0,0,.3);display:none;}

  /* initiatives + filters */
  .inits{padding:24px 28px 30px;}
  .inits-h{font-size:18px;font-weight:500;margin-bottom:14px;}
  .filters{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px;}
  .ddwrap{position:relative;}
  .ddbtn{height:32px;padding:0 14px;border-radius:9999px;border:1px solid #cfd0d4;background:#fff;font:inherit;font-size:12.5px;font-weight:500;cursor:pointer;}
  .ddbtn.on{background:#000;color:#fff;border-color:#000;}
  .ddpanel{position:absolute;top:38px;left:0;z-index:20;background:#fff;border:1px solid var(--line);border-radius:10px;
    box-shadow:0 10px 34px rgba(0,0,0,.16);padding:6px;width:230px;display:none;}
  .ddpanel.open{display:block;}
  .ddrow{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:7px;font-size:13px;cursor:pointer;}
  .ddrow:hover{background:#f4f4f5;}
  .ddrow .box{width:15px;height:15px;border:1.5px solid #cfd0d4;border-radius:4px;flex:none;display:inline-flex;align-items:center;justify-content:center;font-size:10px;color:#fff;}
  .ddrow.on .box{background:#000;border-color:#000;}
  .ddrow .radio{width:15px;height:15px;border:1.5px solid #cfd0d4;border-radius:50%;flex:none;display:inline-flex;align-items:center;justify-content:center;font-size:12px;line-height:1;color:#000;}
  .ddrow.on .radio{border-color:#000;}
  .cdot{width:8px;height:8px;border-radius:50%;flex:none;}

  .scrollx-top{overflow-x:auto;overflow-y:hidden;height:14px;position:sticky;top:0;z-index:6;background:var(--panel);}
  #scrollxSpacer{height:1px;}
  .table-scroll{overflow-x:auto;}
  .thead,.trow{display:grid;grid-template-columns:1.8fr 0.9fr 0.9fr 0.6fr 0.85fr 1.15fr 0.85fr 1.6fr;align-items:start;gap:0 10px;min-width:1160px;}
  .thead>div,.trow>div{min-width:0;}
  .thead{padding:0 0 10px;border-bottom:1px solid var(--line);font-size:10.5px;font-weight:500;letter-spacing:.04em;text-transform:uppercase;color:var(--muted);}
  .trow{padding:13px 0;border-bottom:1px solid var(--line2);}
  .trow>div{align-self:center;}
  .trow .nm{font-size:13px;font-weight:400;line-height:1.35;}
  .badge{display:inline-flex;align-items:center;gap:6px;height:23px;padding:0 9px;border-radius:9999px;font-size:11px;font-weight:600;white-space:nowrap;}
  .st-Launched{background:var(--greenBg);color:var(--green);}
  .st-InProgress{background:var(--blueBg);color:var(--blue);}
  .st-Planned{background:#f1f1f3;color:var(--muted);}
  .own-Lifecycle{background:#eef2ff;color:#4f46e5;} .dot-Lifecycle{background:#4f46e5;}
  .own-CX{background:#fef3c7;color:#b45309;} .dot-CX{background:#b45309;}
  .own-Product{background:#cffafe;color:#0e7490;} .dot-Product{background:#0e7490;}
  .own-Ecom{background:#f3e8ff;color:#7c3aed;} .dot-Ecom{background:#7c3aed;}
  .own-Community{background:#dcfce7;color:#15803d;} .dot-Community{background:#15803d;}
  .own-Ops{background:#e7e5e4;color:#57534e;} .dot-Ops{background:#57534e;}
  .qtr{font-size:13px;font-weight:500;color:var(--muted2);}
  .qtr.tbd{color:#a7a8b3;font-weight:400;font-style:italic;}
  .drives{font-size:12.5px;font-weight:400;color:var(--muted2);}
  .exp{font-size:12.5px;color:var(--muted2);line-height:1.35;}
  .delta{font-size:12.5px;}
  .delta.up{color:var(--green);font-weight:500;} .delta.na{color:#a7a8b3;} .delta.lim{color:#a7a8b3;font-style:italic;font-size:11.5px;}
  .note-c{font-size:11.5px;color:var(--muted);line-height:1.4;}
  .empty{padding:22px 0 4px;font-size:13px;color:var(--muted);}

  .foot{margin-top:20px;font-size:12px;color:var(--muted);line-height:1.7;}
  .foot .lg{display:inline-block;font-size:8.5px;font-weight:800;letter-spacing:.05em;padding:2px 6px;border-radius:4px;vertical-align:middle;margin:0 2px;}
  .foot .lg.live{background:var(--greenBg);color:var(--green);} .foot .lg.intr{background:var(--blueBg);color:var(--blue);}

  @media(max-width:1000px){ .kpis{grid-template-columns:repeat(3,1fr);} }
  @media(max-width:560px){ .kpis{grid-template-columns:repeat(2,1fr);} }
</style>
</head>
<body>
<div id="tip"></div>
<div class="wrap">

  <div class="head-row">
    <div><div class="eyebrow">Retention RevOps</div><h1>Retention &amp; expansion scorecard</h1></div>
    <div class="period-cap"><div class="k">Reporting period</div><div class="v" id="periodLabel">This Month</div></div>
  </div>

  <div class="controls">
    <span class="ctl-label">Period</span>
    <div id="periodChips" style="display:flex;gap:6px;flex-wrap:wrap;"></div>
  </div>
  <div class="note" id="periodNote"></div>

  <div class="panel">
    <div class="panel-h">
      <div class="t">Top metrics</div>
      <div class="r"><b>Live</b> metrics update with the selected period</div>
    </div>
    <div class="kpis" id="kpis"></div>

    <div class="inits">
      <div class="inits-h">Initiatives driving these metrics</div>
      <div class="filters">
        <div class="ddwrap"><button class="ddbtn" id="ddMetricBtn" data-dd="metric">Metric: All ▾</button><div class="ddpanel" id="ddMetric"></div></div>
        <div class="ddwrap"><button class="ddbtn" id="ddOwnerBtn" data-dd="owner">Owner: All ▾</button><div class="ddpanel" id="ddOwner"></div></div>
      </div>
      <div class="scrollx-top" id="scrollxTop"><div id="scrollxSpacer"></div></div>
      <div class="table-scroll" id="tableScroll">
        <div class="thead">
          <div>Initiative</div><div>Status</div><div>Owner</div><div>Quarter</div><div>Drives</div>
          <div>Expected impact</div><div>Δ since launch</div><div>Note</div>
        </div>
        <div id="initRows"></div>
      </div>
    </div>
  </div>

  <div class="foot" id="foot"></div>
</div>

<script>
/* ============ DATA ============ */
const PERIODS = {
  month:     { label:'This Month', sub:'Jun 1–30, 2026', total:{v:'$2.52M', t:-4.8}, retention:{pct:48.8, t:'+4.9pp'}, aov:{v:'$163', t:-3.2} },
  lastmonth: { label:'Last Month', sub:'May 2026',        total:{v:'$2.65M', t:+3.6}, retention:{pct:43.9, t:'−2.3pp'}, aov:{v:'$168', t:+8.4} },
  week:      { label:'Last Week', sub:'last 7 days',      total:{v:'$571K', t:-29.8}, retention:{pct:46.1, t:null},     aov:{v:'$162', t:+2.9} },
  q2:        { label:'Q2 2026', sub:'Apr–Jun 2026',       total:{v:'$7.44M', t:-12.3}, retention:{pct:46.2, t:'+3.5pp'}, aov:{v:'$164', t:-0.6} },
  ytd:       { label:'YTD 2026', sub:'Jan–Jun 2026',      total:{v:'$15.57M', t:-5.2}, retention:{pct:44.4, t:null},     aov:{v:'$165', t:+4.9} },
};
const ORDER = ['month','lastmonth','week','q2','ytd'];
const LTV = '$473';
const RETENTION_GOAL = 60;

const SRC = {
  total:"Total revenue across all sales channels for the selected period. FY2026 target: $45M; year-to-date pacing $6.0M behind plan. Source: Shopify.",
  retention:"Subscription revenue as a share of total revenue for the selected period. The company's broader retention-revenue figure (all returning-customer revenue) is tracked separately and reads higher; the 60% goal reflects that broader definition. Source: Shopify.",
  aov:"Average order value for the selected period, across all sales channels. Source: Shopify.",
  ltv:"All-time blended lifetime revenue per customer (total revenue ÷ total customers). Source: Shopify.",
  retest:"Share of customers with released results who have retested (results released for more than one kit), all-time. A period-based version is in development. Source: Klaviyo.",
  attach:"Share of released results that convert to a supplement subscription (results → supplement attach). A period-based version is in development. Source: Tableau.",
};

const OWNERS = ['Lifecycle','CX','Product','Ecom','Community','Ops'];
const DRIVES_NAME = { total:'Total Revenue', retention:'Retention', aov:'AOV', ltv:'LTV', retest:'Retest Rate', attach:'Attach Rate' };

// Retention roadmap (airfocus). exp = modeled/directional estimate; delta = observed change since launch (— if not launched); note = context.
const INITIATIVES = [
  { name:'Clienteling SMS (72-hr post-results)', status:'Launched', owner:'Lifecycle', quarter:'Q2 2026', drives:'attach',
    exp:'+1–2 pp attach', delta:'attach not time-sliced yet', note:'Live in Q2; per-period attach read pending Tableau.' },
  { name:'While You Wait experience launch', status:'Launched', owner:'Lifecycle', quarter:'Q2 2026', drives:'retention',
    exp:'+2–4 pp retention', delta:'+4.4 pp', note:'Launched Jun 8; retention 43.0→47.4% since (observed co-movement). Full impact ~Q3.' },
  { name:'Okendo review program', status:'Launched', owner:'Lifecycle', quarter:'Q2 2026', drives:'total',
    exp:'≈+$0.2–0.4M/yr', delta:'not isolatable', note:'Lifts conversion/trust; isolating from macro total needs a holdout.' },
  { name:'Okendo referral program ($50/$50)', status:'In Progress', owner:'Lifecycle', quarter:'Q2 2026', drives:'total',
    exp:'≈+$0.3–0.6M/yr', delta:null, note:'Ramps with participation; track revenue on referral codes.' },
  { name:'Improve upsell email flows', status:'In Progress', owner:'Lifecycle', quarter:'TBD', drives:'aov',
    exp:'+$3–6 AOV', delta:null, note:'In build; watch AOV on upsell-touched orders.' },
  { name:'FullStory + Klaviyo prep (behavior triggers)', status:'In Progress', owner:'Lifecycle', quarter:'TBD', drives:'retention',
    exp:'Enabler — multiplies retention levers', delta:null, note:'Foundational for behavior-triggered flows; target live ~Jul.' },
  { name:'PostPilot direct mail (unattached customers)', status:'Planned', owner:'Lifecycle', quarter:'TBD', drives:'attach',
    exp:'+0.5–1 pp attach', delta:null, note:'Direct-mail test to unattached customers; small scale first.' },
  { name:'Loop bundling: 3 & 6-month progressive discounts', status:'Planned', owner:'Ecom', quarter:'TBD', drives:'ltv',
    exp:'+$40–80 LTV', delta:null, note:'Progressive 3/6-mo discounts → longer commitment & LTV.' },
  { name:'Wrapped launch w/ personalized hints', status:'Planned', owner:'Product', quarter:'TBD', drives:'attach',
    exp:'+1–2 pp attach', delta:null, note:'Personalized year-in-review → attach; watch post-launch cliff.' },
  { name:'Campaign: time-limited fall reset attach drive', status:'Planned', owner:'Lifecycle', quarter:'TBD', drives:'attach',
    exp:'+0.5–1 pp attach', delta:null, note:'Time-limited campaign; expect a burst, not sustained.' },
  { name:"Post-Wrapped 'cliff' contingency", status:'Planned', owner:'Product', quarter:'TBD', drives:'retention',
    exp:'Protects post-campaign retention', delta:null, note:'Sustains attach after the Wrapped burst.' },
  { name:'Friends & Family review campaign (Amazon)', status:'Planned', owner:'Lifecycle', quarter:'TBD', drives:'total',
    exp:'≈+$0.1–0.2M/yr', delta:null, note:'Seeds GI/OHI reviews on Amazon → conversion.' },
  { name:'Open House On Demand', status:'Planned', owner:'Community', quarter:'TBD', drives:'retention',
    exp:'+0.5–1 pp retention', delta:null, note:'On-demand education → engagement & retention.' },
  { name:'Peacock prompting (community/social)', status:'Planned', owner:'Community', quarter:'TBD', drives:'retest',
    exp:'+1–2 pp retest', delta:null, note:'Prompts R&R comparison → retest (best available retest driver).' },
  { name:'Claims refresh — science-backed 90-day claims', status:'Planned', owner:'Ops', quarter:'TBD', drives:'total',
    exp:'≈+$0.1–0.3M/yr', delta:null, note:'90-day claims → conversion lift; needs legal/Ops.' },
  { name:'Loyalty & Streaks program design', status:'Planned', owner:'Lifecycle', quarter:'TBD', drives:'ltv',
    exp:'+$30–60 LTV', delta:null, note:'Loyalty/streaks → repeat & LTV; design phase.' },
  { name:'Cancel-flow A/B → Klaviyo churn/win-back', status:'Planned', owner:'CX', quarter:'TBD', drives:'retention',
    exp:'≈+$0.2–0.35M/yr', delta:null, note:'Proactive save + winback (re-evidence, not discount); needs CX offers + Loop data.' },
  { name:'Personalized Winback Flow', status:'Planned', owner:'Lifecycle', quarter:'TBD', drives:'retention',
    exp:'≈+$0.1–0.2M/yr', delta:null, note:'Reactivate lapsed subscribers with personalized re-evidence.' },
];

let state = { period:'month', metric:null, owners:new Set(), openDD:null };

/* ============ metric cards ============ */
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function trend(t){ if(t===null||t===undefined) return `<span class="flat">—</span>`;
  const up=(typeof t==='number')?t>=0:/^\+/.test(t);
  const txt=(typeof t==='number')?(t>=0?'▲ +':'▼ ')+Math.abs(t).toFixed(1)+'%':(/^\+/.test(t)?'▲ ':'▼ ')+t.replace(/^[+−-]/,'');
  return `<span class="${up?'up':'down'}">${txt} vs prior</span>`; }
function card(c){ return `<div class="mcard ${c.core?'core':''}">
  <div class="m-top"><span class="m-name">${c.name}</span>
    <span class="m-tools"><span class="m-badge ${c.badgeCls}">${c.badge}</span><span class="i" data-tip="${c.tip}">i</span></span></div>
  <div class="m-val">${c.value}</div><div class="m-trend">${c.trend}</div>
  <div class="m-ctx"${c.ctxColor?` style="color:${c.ctxColor}"`:''}>${c.ctx}</div>
  <div class="m-goal ${c.goal?'':'unset'}"><span class="gl">Goal / Budget</span>${c.goal?c.goal:'not set — owner input needed'}</div></div>`; }
function renderKpis(){
  const p=PERIODS[state.period]; const gap=(RETENTION_GOAL-p.retention.pct).toFixed(1);
  const retC=p.retention.pct>=RETENTION_GOAL?'var(--green)':(p.retention.pct>=53?'var(--amber)':'var(--red)');
  const cards=[
    { core:true, name:'Total Revenue', badge:'CORE', badgeCls:'core', tip:'total', value:p.total.v, trend:trend(p.total.t), ctx:'all sales channels',
      goal:'$45M FY26 · <span style="color:#ff8a94">−$6.0M vs plan YTD</span>' },
    { name:'Retention Revenue', badge:'LIVE', badgeCls:'live', tip:'retention', value:p.retention.pct.toFixed(1)+'%', trend:trend(p.retention.t), ctx:'subscription share of total',
      goal:`${RETENTION_GOAL}% · <span style="color:${retC}">−${gap}pp to goal</span>` },
    { name:'AOV', badge:'LIVE', badgeCls:'live', tip:'aov', value:p.aov.v, trend:trend(p.aov.t), ctx:'across all channels', goal:null },
    { name:'LTV', badge:'LIVE', badgeCls:'live', tip:'ltv', value:LTV, trend:'<span class="flat">all-time</span>', ctx:'blended lifetime / customer', goal:null },
    { name:'Retest Rate', badge:'INTERIM', badgeCls:'interim', tip:'retest', value:'17.0%', trend:'<span class="flat">all-time</span>', ctx:'period view in development', ctxColor:'var(--blue)', goal:null },
    { name:'Attach Rate', badge:'INTERIM', badgeCls:'interim', tip:'attach', value:'29.1%', trend:'<span class="flat">Q1 2026</span>', ctx:'results → supplement', ctxColor:'var(--blue)', goal:null },
  ];
  document.getElementById('kpis').innerHTML=cards.map(card).join('');
}

/* ============ filters (dropdowns) ============ */
function renderFilters(){
  const mBtn=document.getElementById('ddMetricBtn'), mP=document.getElementById('ddMetric');
  mBtn.textContent='Metric: '+(state.metric?DRIVES_NAME[state.metric]:'All')+' ▾'; mBtn.classList.toggle('on',state.openDD==='metric'); mP.classList.toggle('open',state.openDD==='metric');
  const mOpts=[{k:null,l:'All'},{k:'total',l:'Total Revenue'},{k:'retention',l:'Retention'},{k:'aov',l:'AOV'},{k:'ltv',l:'LTV'},{k:'retest',l:'Retest Rate'},{k:'attach',l:'Attach Rate'}];
  mP.innerHTML=mOpts.map(o=>`<div class="ddrow ${state.metric===o.k?'on':''}" data-msel="${o.k===null?'':o.k}"><span class="radio">${state.metric===o.k?'●':''}</span>${esc(o.l)}</div>`).join('');
  const oBtn=document.getElementById('ddOwnerBtn'), oP=document.getElementById('ddOwner');
  oBtn.textContent='Owner: '+(state.owners.size?state.owners.size+' selected':'All')+' ▾'; oBtn.classList.toggle('on',state.openDD==='owner'); oP.classList.toggle('open',state.openDD==='owner');
  oP.innerHTML=`<div class="ddrow ${state.owners.size===0?'on':''}" data-oall><span class="box">${state.owners.size===0?'✓':''}</span>All owners</div>`+
    OWNERS.map(o=>`<div class="ddrow ${state.owners.has(o)?'on':''}" data-osel="${o}"><span class="box">${state.owners.has(o)?'✓':''}</span><span class="cdot dot-${o}"></span>${o}</div>`).join('');
}

/* ============ initiatives table ============ */
function filtered(){ return INITIATIVES.filter(i=>
  (!state.metric || i.drives===state.metric) &&
  (state.owners.size===0 || state.owners.has(i.owner)) ); }
function deltaCell(dv){
  if(dv===null||dv===undefined) return `<span class="delta na">—</span>`;
  if(/^\+/.test(dv)) return `<span class="delta up">▲ ${esc(dv)}</span>`;
  return `<span class="delta lim">${esc(dv)}</span>`;
}
function renderInits(){
  const rows=filtered(); const wrap=document.getElementById('initRows');
  if(!rows.length){ wrap.innerHTML=`<div class="empty">No initiatives match the current filters.</div>`; return; }
  wrap.innerHTML=rows.map(i=>{
    const stCls=i.status.replace(/\s/g,'');
    return `<div class="trow">
      <div class="nm">${esc(i.name)}</div>
      <div><span class="badge st-${stCls}">${i.status}</span></div>
      <div><span class="badge own-${i.owner}">${i.owner}</span></div>
      <div><span class="qtr ${i.quarter==='TBD'?'tbd':''}">${i.quarter}</span></div>
      <div class="drives">${DRIVES_NAME[i.drives]}</div>
      <div class="exp">${esc(i.exp)}</div>
      <div>${deltaCell(i.delta)}</div>
      <div class="note-c">${esc(i.note)}</div>
    </div>`;}).join('');
}

function renderControls(){
  document.getElementById('periodChips').innerHTML=ORDER.map(k=>
    `<button class="chip sm ${k===state.period?'on':''}" data-period="${k}">${esc(PERIODS[k].label)}</button>`).join('');
  document.getElementById('periodLabel').textContent=PERIODS[state.period].label;
  document.getElementById('periodNote').innerHTML=`<b>Live</b> — figures update with the selected period (${esc(PERIODS[state.period].sub)}).`;
}

function renderFoot(){
  document.getElementById('foot').innerHTML =
    `<span class="lg live">LIVE</span> updates with the selected period (Total Revenue, Retention, AOV; LTV all-time). &nbsp;·&nbsp;
     <span class="lg intr">INTERIM</span> Retest Rate &amp; Attach Rate — all-time / Q1; period-based views in development. &nbsp;·&nbsp;
     Retention = subscription revenue as a share of total; the broader retention-revenue figure is tracked separately. &nbsp;·&nbsp;
     <b>Goal / Budget</b> shows committed targets where set (Total Revenue: FY plan; Retention: 60% goal); metrics marked "not set" are pending owner input. &nbsp;·&nbsp;
     Initiatives, status, owner &amp; quarter from the retention roadmap. &nbsp;·&nbsp;
     <b>Expected impact</b> = modeled / directional estimates. <b>Δ since launch</b> = observed movement in the driven metric (co-movement, not isolated attribution); "—" = not yet launched. &nbsp;·&nbsp; ⓘ = definition &amp; source. &nbsp;·&nbsp; As of June 2026.`;
}
function renderAll(){ renderControls(); renderKpis(); renderFilters(); renderInits(); }

/* ============ tooltip + events ============ */
const tip=document.getElementById('tip');
function showTip(el){ const k=el.getAttribute('data-tip'); if(!SRC[k])return; tip.textContent=SRC[k]; tip.style.display='block';
  const r=el.getBoundingClientRect(); let x=r.left+r.width/2-150,y=r.bottom+9; x=Math.max(10,Math.min(x,window.innerWidth-310));
  if(y+tip.offsetHeight>window.innerHeight-10) y=r.top-tip.offsetHeight-9; tip.style.left=x+'px'; tip.style.top=y+'px'; }
function hideTip(){ tip.style.display='none'; }

document.addEventListener('click', e=>{
  const icon=e.target.closest('.i[data-tip]');
  if(icon){ e.stopPropagation(); (tip.style.display==='block'&&tip._k===icon.getAttribute('data-tip'))?hideTip():(tip._k=icon.getAttribute('data-tip'),showTip(icon)); return; }
  const pc=e.target.closest('[data-period]'); if(pc){ state.period=pc.getAttribute('data-period'); renderControls(); renderKpis(); hideTip(); return; }
  const dd=e.target.closest('[data-dd]'); if(dd){ e.stopPropagation(); const k=dd.getAttribute('data-dd'); state.openDD=state.openDD===k?null:k; renderFilters(); return; }
  const ms=e.target.closest('[data-msel]'); if(ms){ e.stopPropagation(); state.metric=ms.getAttribute('data-msel')||null; state.openDD=null; renderFilters(); renderInits(); return; }
  const oa=e.target.closest('[data-oall]'); if(oa){ e.stopPropagation(); state.owners.clear(); renderFilters(); renderInits(); return; }
  const os=e.target.closest('[data-osel]'); if(os){ e.stopPropagation(); const o=os.getAttribute('data-osel'); state.owners.has(o)?state.owners.delete(o):state.owners.add(o); renderFilters(); renderInits(); return; }
  if(state.openDD && !e.target.closest('.filters')){ state.openDD=null; renderFilters(); }
  hideTip();
});
window.addEventListener('scroll', hideTip, true);

renderFoot(); renderAll();

/* floating (sticky) top scrollbar synced with the table's horizontal scroll */
(function(){
  const ts=document.getElementById('tableScroll'), st=document.getElementById('scrollxTop'), sp=document.getElementById('scrollxSpacer');
  if(!ts||!st||!sp) return;
  const setW=()=>{ sp.style.width=ts.scrollWidth+'px'; };
  setW(); window.addEventListener('resize', setW);
  let lock=false;
  st.addEventListener('scroll',()=>{ if(lock)return; lock=true; ts.scrollLeft=st.scrollLeft; lock=false; });
  ts.addEventListener('scroll',()=>{ if(lock)return; lock=true; st.scrollLeft=ts.scrollLeft; lock=false; });
})();
</script>
</body>
