<!DOCTYPE html>
<!-- ABOUTME: Retention RevOps scorecard — 6 uniformly-formatted metric cards (Total Revenue = core) over live Shopify data, -->
<!-- ABOUTME: with retention-roadmap initiatives mapped to each metric. Metrics update per period; retest interim, avg-products in development. -->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Retention RevOps — Scorecard</title>
<style>
  :root{
    --bg:#f4f4f5; --panel:#fff; --line:#e7e7e9; --line2:#f0f0f1;
    --ink:#000; --muted:#717384; --muted2:#42434d;
    --green:#146464; --amber:#ab6700; --red:#da1c2c;
    --greenBg:#ecf2f1; --amberBg:#f6efe1; --redBg:#fbecea; --blueBg:#e7eef6; --blue:#1f4855;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--ink);
    font-family:"Helvetica Neue",Helvetica,system-ui,-apple-system,"Segoe UI",sans-serif;
    -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;}
  .wrap{max-width:1180px;margin:0 auto;padding:44px 40px 80px;}

  .eyebrow{font-size:13px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted2);}
  h1{font-weight:400;font-size:38px;line-height:1.1;letter-spacing:-.015em;margin:10px 0 0;}
  .head-row{display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:20px;margin-bottom:24px;}
  .period-cap{text-align:right;}
  .period-cap .k{font-size:13px;font-weight:300;color:var(--muted);}
  .period-cap .v{font-size:19px;font-weight:400;margin-top:2px;}

  .controls{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:18px;}
  .ctl-label{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);}
  .chip{height:34px;padding:0 15px;border-radius:9999px;border:1px solid #cfd0d4;background:#fff;color:#000;
    font:inherit;font-size:13px;font-weight:500;cursor:pointer;white-space:nowrap;}
  .chip.on{background:#000;color:#fff;border-color:#000;}
  .chip.sm{height:30px;padding:0 13px;font-size:12.5px;}
  .note{font-size:12.5px;color:var(--muted);margin:2px 0 16px;min-height:16px;}
  .note b{color:var(--muted2);font-weight:500;}

  .panel{background:var(--panel);border:1px solid var(--line);}
  .panel-h{display:flex;justify-content:space-between;align-items:center;padding:22px 28px;border-bottom:1px solid var(--line);flex-wrap:wrap;gap:8px;}
  .panel-h .t{font-size:16px;font-weight:500;}
  .panel-h .r{font-size:13px;font-weight:300;color:var(--muted2);}
  .panel-h .r b{font-weight:500;color:#000;}

  /* ===== KPI grid — every card identical: name+badge+ⓘ / value / trend / context ===== */
  .kpis{display:grid;grid-template-columns:repeat(6,1fr);}
  .mcard{position:relative;text-align:left;background:#fff;color:#000;font:inherit;cursor:pointer;
    border:none;border-right:1px solid var(--line);border-bottom:1px solid var(--line);
    padding:18px 18px 20px;display:flex;flex-direction:column;box-shadow:inset 0 -3px 0 0 transparent;min-height:184px;}
  .mcard:hover{background:#fafafa;}
  .mcard.sel{background:#f7f7f8;box-shadow:inset 0 -3px 0 0 #000;}
  .mcard.core{background:#141821;color:#fff;}
  .mcard.core:hover{background:#1b2130;}
  .mcard.core.sel{box-shadow:inset 0 -3px 0 0 #5eead4;}
  .m-top{display:flex;justify-content:space-between;align-items:flex-start;gap:6px;min-height:44px;}
  .m-name{font-size:12px;font-weight:500;color:var(--muted);line-height:1.3;}
  .mcard.core .m-name{color:#aeb4c2;}
  .m-tools{display:inline-flex;gap:5px;align-items:center;flex:none;}
  .m-badge{font-size:8px;font-weight:800;letter-spacing:.04em;padding:2px 5px;border-radius:4px;white-space:nowrap;}
  .m-badge.live{background:var(--greenBg);color:var(--green);}
  .m-badge.interim{background:var(--blueBg);color:var(--blue);}
  .m-badge.placeholder{background:var(--amberBg);color:var(--amber);}
  .mcard.core .m-badge.core{background:#5eead4;color:#0f3d3a;}
  .m-val{font-size:28px;font-weight:400;letter-spacing:-.015em;margin-top:8px;line-height:1.05;}
  .m-trend{font-size:11.5px;font-weight:400;margin-top:7px;}
  .up{color:var(--green);} .down{color:var(--red);} .flat{color:var(--muted);}
  .mcard.core .flat{color:#8b93a6;}
  .m-ctx{font-size:11.5px;font-weight:400;color:var(--muted);margin-top:auto;padding-top:12px;}
  .mcard.core .m-ctx{color:#8b93a6;}

  .i{display:inline-flex;align-items:center;justify-content:center;width:15px;height:15px;border-radius:50%;
    background:#e2e2e6;color:#5b5c66;font-size:9px;font-weight:700;font-style:italic;font-family:Georgia,serif;
    cursor:pointer;user-select:none;flex:none;}
  .i:hover{background:#000;color:#fff;}
  .mcard.core .i{background:#2b3346;color:#c7ccd8;}
  .mcard.core .i:hover{background:#fff;color:#141821;}
  #tip{position:fixed;z-index:99;max-width:300px;background:#141821;color:#e9eaee;font-size:12px;line-height:1.5;
    padding:13px 15px;border-radius:10px;box-shadow:0 10px 34px rgba(0,0,0,.3);display:none;}

  /* initiatives */
  .inits{padding:26px 28px 30px;}
  .inits-h{display:flex;justify-content:space-between;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:16px;}
  .inits-h .t{font-size:18px;font-weight:500;}
  .focus-chips{display:flex;gap:6px;flex-wrap:wrap;}
  .thead,.trow{display:grid;grid-template-columns:2.1fr 0.9fr 1.4fr 1fr 0.9fr 0.7fr 1.2fr;align-items:center;}
  .thead{padding:0 0 10px;border-bottom:1px solid var(--line);
    font-size:11px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);}
  .trow{padding:14px 0;border-bottom:1px solid var(--line2);}
  .trow .nm{display:flex;align-items:center;gap:10px;font-size:14px;font-weight:400;}
  .trow .nm .sdot{width:7px;height:7px;border-radius:50%;flex:none;}
  .stage{display:inline-flex;align-items:center;gap:6px;height:24px;padding:0 10px;border-radius:9999px;
    border:1px solid;font-size:11.5px;font-weight:500;white-space:nowrap;}
  .stage .pd{width:6px;height:6px;border-radius:50%;}
  .st-Done{color:var(--green);background:var(--greenBg);border-color:var(--greenBg);}
  .st-Now{color:#000;background:#fff;border-color:#cfd0d4;}
  .st-Next{color:var(--blue);background:var(--blueBg);border-color:#d5e3e7;}
  .st-Later{color:var(--muted);background:#f4f4f5;border-color:var(--line);}
  .drives,.owner{font-size:13px;font-weight:300;color:var(--muted2);}
  .tgt{font-size:13.5px;font-weight:500;}
  .tgt.ph{color:var(--muted);font-weight:400;font-style:italic;}
  .act{font-size:13.5px;font-weight:500;color:var(--muted);}
  .prog{display:flex;align-items:center;gap:10px;}
  .prog .bar{flex:1;height:6px;background:var(--line);}
  .prog .bar .fill{height:6px;background:#000;}
  .prog .pv{font-size:12px;font-weight:500;width:30px;text-align:right;color:var(--muted);}
  .empty{padding:22px 0 4px;font-size:13px;color:var(--muted);}

  .foot{margin-top:20px;font-size:12px;color:var(--muted);line-height:1.7;}
  .foot .lg{display:inline-block;font-size:8.5px;font-weight:800;letter-spacing:.05em;padding:2px 6px;border-radius:4px;vertical-align:middle;margin:0 2px;}
  .foot .lg.live{background:var(--greenBg);color:var(--green);}
  .foot .lg.intr{background:var(--blueBg);color:var(--blue);}
  .foot .lg.ph{background:var(--amberBg);color:var(--amber);}

  @media(max-width:1000px){
    .kpis{grid-template-columns:repeat(3,1fr);}
    .thead{display:none;}
    .trow{grid-template-columns:1fr 1fr;gap:6px 12px;padding:14px 0;}
    .trow .nm{grid-column:1 / -1;}
  }
  @media(max-width:560px){ .kpis{grid-template-columns:repeat(2,1fr);} }
</style>
</head>
<body>
<div id="tip"></div>
<div class="wrap">

  <div class="head-row">
    <div>
      <div class="eyebrow">Retention RevOps</div>
      <h1>Retention &amp; expansion scorecard</h1>
    </div>
    <div class="period-cap">
      <div class="k">Reporting period</div>
      <div class="v" id="periodLabel">This Month</div>
    </div>
  </div>

  <div class="controls">
    <span class="ctl-label">Period</span>
    <div id="periodChips" style="display:flex;gap:6px;flex-wrap:wrap;"></div>
  </div>
  <div class="note" id="periodNote"></div>

  <div class="panel">
    <div class="panel-h">
      <div class="t">Top metrics</div>
      <div class="r"><b>3 live</b> · updated for the selected period</div>
    </div>

    <div class="kpis" id="kpis"></div>

    <div class="inits">
      <div class="inits-h">
        <div class="t">Initiatives driving these metrics</div>
        <div class="focus-chips" id="focusChips"></div>
      </div>
      <div class="thead">
        <div>Initiative</div><div>Stage</div><div>Drives</div><div>Owner</div><div>Target</div><div>Actual</div><div>Progress to target</div>
      </div>
      <div id="initRows"></div>
    </div>
  </div>

  <div class="foot" id="foot"></div>
</div>

<script>
/* ============ DATA ============ */
const PERIODS = {
  month:     { label:'This Month', sub:'Jun 1–30, 2026', total:{v:'$2.52M', t:-4.8}, retention:{pct:48.8, t:'+4.9pp'}, aov:{v:'$163', t:-3.2} },
  lastmonth: { label:'Last Month', sub:'May 2026',        total:{v:'$2.65M', t:+3.6}, retention:{pct:43.9, t:'−2.3pp'}, aov:{v:'$168', t:+8.4} },
  week:      { label:'Last Week', sub:'last 7 days',      total:{v:'$571K', t:-29.8}, retention:{pct:46.1, t:null},     aov:{v:'$162', t:+2.9} },
  q2:        { label:'Q2 2026', sub:'Apr–Jun 2026',       total:{v:'$7.44M', t:-12.3}, retention:{pct:46.2, t:'+3.5pp'}, aov:{v:'$164', t:-0.6} },
  ytd:       { label:'YTD 2026', sub:'Jan–Jun 2026',      total:{v:'$15.57M', t:-5.2}, retention:{pct:44.4, t:null},     aov:{v:'$165', t:+4.9} },
};
const ORDER = ['month','lastmonth','week','q2','ytd'];
const LTV = '$473';
const RETENTION_GOAL = 60;
let state = { period:'month', focus:null };

// Public-facing definitions — self-contained, no personal notes.
const SRC = {
  total:"Total revenue across all sales channels for the selected period. FY2026 target: $45M; year-to-date pacing $6.0M behind plan. Source: Shopify.",
  retention:"Subscription revenue as a share of total revenue for the selected period. The company's broader retention-revenue figure (all returning-customer revenue) is tracked separately and reads higher; the 60% goal reflects that broader definition. Source: Shopify.",
  aov:"Average order value for the selected period, across all sales channels. Source: Shopify.",
  ltv:"All-time blended lifetime revenue per customer (total revenue ÷ total customers). Source: Shopify.",
  retest:"Share of customers with released results who have retested (results released for more than one kit), all-time. A period-based version is in development. Source: Klaviyo.",
  avgproducts:"Average number of active subscription products per subscriber. In development from subscription data.",
};

const INITIATIVES = [
  { name:'Homepage hero tile swap (Memorial Day promo)', stage:'Done',  drives:'total',       owner:'Nargiza' },
  { name:'Friends & Family review campaign (Amazon)',     stage:'Later', drives:'total',       owner:'Marketing' },
  { name:'Claims refresh — science-backed 90-day claims', stage:'Later', drives:'total',       owner:'Juan / Lan' },
  { name:'Okendo referral program ($50/$50)',             stage:'Now',   drives:'total',       owner:'Marketing' },
  { name:'Okendo review program',                         stage:'Done',  drives:'total',       owner:'Marketing' },
  { name:'While You Wait experience launch',              stage:'Done',  drives:'retention',   owner:'Marissa' },
  { name:'Clienteling SMS (72-hr post-results)',          stage:'Done',  drives:'retention',   owner:'Marketing' },
  { name:'FullStory + Klaviyo prep (behavior triggers)',  stage:'Next',  drives:'retention',   owner:'Marissa / Sean' },
  { name:'Wrapped launch w/ personalized hints',          stage:'Later', drives:'retention',   owner:'Sean' },
  { name:"Post-Wrapped 'cliff' contingency",              stage:'Later', drives:'retention',   owner:'Sean' },
  { name:'Open House On Demand',                          stage:'Later', drives:'retention',   owner:'Lisa' },
  { name:'Peacock prompting (community/social)',          stage:'Later', drives:'retention',   owner:'Unassigned' },
  { name:'Loyalty & Streaks program design',              stage:'Later', drives:'retention',   owner:'Elisabeth' },
  { name:'Cancel-flow A/B → Klaviyo churn/win-back',      stage:'Later', drives:'retention',   owner:'Lifecycle' },
  { name:'Improve upsell email flows',                    stage:'Next',  drives:'aov',         owner:'Marissa' },
  { name:'PostPilot direct mail (unattached customers)',  stage:'Later', drives:'aov',         owner:'Keri' },
  { name:'Campaign: time-limited fall reset attach drive',stage:'Later', drives:'avgproducts', owner:'Keri' },
  { name:'Loop bundling: 3 & 6-month progressive discounts',stage:'Later',drives:'avgproducts',owner:'Elizabeth' },
];
const DRIVES_NAME = { total:'Total Revenue', retention:'Retention', aov:'AOV', ltv:'LTV', avgproducts:'Avg products/sub', retest:'Retest Rate' };

/* ============ RENDER ============ */
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function trend(t){ if(t===null||t===undefined) return `<span class="flat">—</span>`;
  const up=(typeof t==='number')?t>=0:/^\+/.test(t);
  const txt=(typeof t==='number')?(t>=0?'▲ +':'▼ ')+Math.abs(t).toFixed(1)+'%':(/^\+/.test(t)?'▲ ':'▼ ')+t.replace(/^[+−-]/,'');
  return `<span class="${up?'up':'down'}">${txt} vs prior</span>`; }

// Uniform card: name+badge+ⓘ / value / trend / context
function card(c){
  return `<div class="mcard ${c.core?'core':''}" data-focus="${c.focus}">
    <div class="m-top"><span class="m-name">${c.name}</span>
      <span class="m-tools"><span class="m-badge ${c.badgeCls}">${c.badge}</span><span class="i" data-tip="${c.tip}">i</span></span></div>
    <div class="m-val">${c.value}</div>
    <div class="m-trend">${c.trend}</div>
    <div class="m-ctx"${c.ctxColor?` style="color:${c.ctxColor}"`:''}>${c.ctx}</div>
  </div>`;
}

function renderKpis(){
  const p = PERIODS[state.period];
  const gap = (RETENTION_GOAL - p.retention.pct).toFixed(1);
  const retC = p.retention.pct>=RETENTION_GOAL ? 'var(--green)' : (p.retention.pct>=53?'var(--amber)':'var(--red)');
  const cards = [
    { core:true, focus:'total', name:'Total Revenue', badge:'CORE', badgeCls:'core', tip:'total',
      value:p.total.v, trend:trend(p.total.t), ctx:'FY26 target $45M · −$6.0M behind', ctxColor:'#ff8a94' },
    { focus:'retention', name:'Retention Revenue', badge:'LIVE', badgeCls:'live', tip:'retention',
      value:p.retention.pct.toFixed(1)+'%', trend:trend(p.retention.t), ctx:`Goal ${RETENTION_GOAL}% · at risk (−${gap}pp)`, ctxColor:retC },
    { focus:'aov', name:'AOV', badge:'LIVE', badgeCls:'live', tip:'aov',
      value:p.aov.v, trend:trend(p.aov.t), ctx:'across all channels' },
    { focus:'ltv', name:'LTV', badge:'LIVE', badgeCls:'live', tip:'ltv',
      value:LTV, trend:'<span class="flat">all-time</span>', ctx:'blended lifetime / customer' },
    { focus:'retest', name:'Retest Rate', badge:'INTERIM', badgeCls:'interim', tip:'retest',
      value:'17.0%', trend:'<span class="flat">all-time</span>', ctx:'period view in development', ctxColor:'var(--blue)' },
    { focus:'avgproducts', name:'Avg Products / Subscriber', badge:'PENDING', badgeCls:'placeholder', tip:'avgproducts',
      value:'1.4', trend:'<span class="flat">—</span>', ctx:'in development', ctxColor:'var(--amber)' },
  ];
  document.getElementById('kpis').innerHTML = cards.map(card).join('');
}

function renderControls(){
  document.getElementById('periodChips').innerHTML = ORDER.map(k=>
    `<button class="chip sm ${k===state.period?'on':''}" data-period="${k}">${esc(PERIODS[k].label)}</button>`).join('');
  document.getElementById('periodLabel').textContent = PERIODS[state.period].label;
  document.getElementById('periodNote').innerHTML = `<b>Live</b> — figures update with the selected period (${esc(PERIODS[state.period].sub)}).`;
}

function renderFocus(){
  const chips=[{k:null,l:'All initiatives'},{k:'total',l:'Total Revenue'},{k:'retention',l:'Retention'},{k:'aov',l:'AOV'},{k:'avgproducts',l:'Avg products/sub'},{k:'retest',l:'Retest Rate'}];
  document.getElementById('focusChips').innerHTML = chips.map(c=>
    `<button class="chip sm ${state.focus===c.k?'on':''}" data-focuschip="${c.k===null?'':c.k}">${esc(c.l)}</button>`).join('');
}

function renderInits(){
  const rows = state.focus ? INITIATIVES.filter(i=>i.drives===state.focus) : INITIATIVES;
  const wrap = document.getElementById('initRows');
  if(!rows.length){ wrap.innerHTML=`<div class="empty">No initiatives currently mapped to <b>${esc(DRIVES_NAME[state.focus]||state.focus)}</b> — a gap worth noting.</div>`; return; }
  wrap.innerHTML = rows.map(i=>{
    const sc = i.stage==='Done'?'var(--green)':i.stage==='Now'?'#000':i.stage==='Next'?'var(--blue)':'var(--muted)';
    return `<div class="trow">
      <div class="nm"><span class="sdot" style="background:${sc}"></span>${esc(i.name)}</div>
      <div><span class="stage st-${i.stage}"><span class="pd" style="background:${sc}"></span>${i.stage}</span></div>
      <div class="drives">${esc(DRIVES_NAME[i.drives])}</div><div class="owner">${esc(i.owner)}</div>
      <div class="tgt ph">Set target</div><div class="act">—</div>
      <div class="prog"><div class="bar"><div class="fill" style="width:0%"></div></div><span class="pv">—</span></div>
    </div>`;}).join('');
}

function renderFoot(){
  document.getElementById('foot').innerHTML =
    `<span class="lg live">LIVE</span> updates with the selected period (Total Revenue, Retention, AOV; LTV is all-time). &nbsp;·&nbsp;
     <span class="lg intr">INTERIM</span> Retest Rate — all-time; period-based view in development. &nbsp;·&nbsp;
     <span class="lg ph">PENDING</span> Average Products / Subscriber — in development. &nbsp;·&nbsp;
     Retention = subscription revenue as a share of total; the broader retention-revenue figure is tracked separately. &nbsp;·&nbsp;
     Initiatives from the retention roadmap; targets in progress. &nbsp;·&nbsp; ⓘ = definition &amp; source. &nbsp;·&nbsp; As of June 2026.`;
}

function renderAll(){ renderControls(); renderKpis(); renderFocus(); renderInits(); }

/* ============ TOOLTIP + EVENTS ============ */
const tip=document.getElementById('tip');
function showTip(el){ const k=el.getAttribute('data-tip'); if(!SRC[k])return; tip.textContent=SRC[k]; tip.style.display='block';
  const r=el.getBoundingClientRect(); let x=r.left+r.width/2-150, y=r.bottom+9; x=Math.max(10,Math.min(x,window.innerWidth-310));
  if(y+tip.offsetHeight>window.innerHeight-10) y=r.top-tip.offsetHeight-9; tip.style.left=x+'px'; tip.style.top=y+'px'; }
function hideTip(){ tip.style.display='none'; }
document.addEventListener('click', e=>{
  const icon=e.target.closest('.i[data-tip]');
  if(icon){ e.stopPropagation(); (tip.style.display==='block'&&tip._k===icon.getAttribute('data-tip'))?hideTip():(tip._k=icon.getAttribute('data-tip'),showTip(icon)); return; }
  const cardEl=e.target.closest('.mcard[data-focus]');
  if(cardEl){ const k=cardEl.getAttribute('data-focus'); state.focus=state.focus===k?null:k; renderFocus(); renderInits(); hideTip(); return; }
  const pc=e.target.closest('[data-period]'); if(pc){ state.period=pc.getAttribute('data-period'); renderControls(); renderKpis(); hideTip(); return; }
  const fc=e.target.closest('[data-focuschip]'); if(fc){ state.focus=fc.getAttribute('data-focuschip')||null; renderFocus(); renderInits(); return; }
  hideTip();
});
window.addEventListener('scroll', hideTip, true);

renderFoot(); renderAll();
</script>
</body>
</html>
